# ─────────────────────────────────────────────────────────────────
#  trino/catalog/iceberg.properties
#
#  Trino catalog config — connects Trino to Nessie + S3
#
#  WHAT THIS FILE DOES:
#  Tells Trino which catalog type to use (Nessie/Iceberg),
#  where the Nessie server is, which branch to read from,
#  and how to authenticate to S3.
#
#  IMPORTANT NOTES:
#  - Use iceberg.catalog.type=nessie (NOT rest) for Nessie API v2
#  - iceberg.nessie-catalog.uri uses hyphen (nessie-catalog) not dot
#  - No access keys needed if EC2 has an IAM role attached
#  - s3.path-style-access=false for real AWS S3 (true only for MinIO)
#  - Remove s3.endpoint line for real AWS (only needed for MinIO)
# ─────────────────────────────────────────────────────────────────

connector.name=iceberg
iceberg.catalog.type=nessie

# ── Nessie connection ─────────────────────────────────────────────
# Replace with your real Nessie URL and branch
iceberg.nessie-catalog.uri=http://<your-nessie-host>:19120/api/v2
iceberg.nessie-catalog.default-warehouse-dir=s3://<your-s3-bucket>/
iceberg.nessie-catalog.ref=<your-branch-name>

# ── Iceberg settings ──────────────────────────────────────────────
iceberg.file-format=PARQUET
iceberg.target-max-file-size=256MB
iceberg.security=allow-all

# ── S3 / AWS settings ─────────────────────────────────────────────
# IAM role on EC2 handles authentication — no access keys needed
fs.native-s3.enabled=true
s3.region=<your-aws-region>
s3.path-style-access=false

# ── FOR LOCAL DEV WITH MINIO ONLY (remove for real AWS) ──────────
# s3.endpoint=http://minio:9000
# s3.path-style-access=true
# s3.aws-access-key=minioadmin
# s3.aws-secret-key=minioadmin
